<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site.title }} — {{ page.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/img/favicon-64.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% if page.url == "/" %}
<link rel="preload" as="image" href="{{ '/assets/img/screenshot_hero.webp' | relative_url }}" type="image/webp">
{% endif %}
</head>
<body>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="brand">
      <img src="{{ '/assets/img/neurotraxx-logo.png' | relative_url }}" alt="NeuroTraxx" class="brand-icon">
      <img src="{{ '/assets/img/logotype.png' | relative_url }}" alt="NeuroTraxx" class="brand-logotype">
    </a>
    <div class="nav-links">

      <div class="dropdown">
        <a href="{{ '/product/' | relative_url }}">Product</a>
        <div class="dropdown-menu">
          <a href="{{ '/product/' | relative_url }}">Overview</a>
          <a href="{{ '/' | relative_url }}#how-it-works">How It Works</a>
          <a href="{{ '/product/#use-cases' | relative_url }}">Use Cases</a>
        </div>
      </div>

      <div class="dropdown">
        <a href="{{ '/' | relative_url }}#features">Features</a>
        <div class="dropdown-menu">
          <a href="{{ '/' | relative_url }}#features">Core Features</a>
          <a href="{{ '/features/specs/' | relative_url }}">Technical Specs</a>
          <a href="{{ '/features/roadmap/' | relative_url }}">Roadmap</a>
        </div>
      </div>

      <a href="{{ '/solutions/' | relative_url }}">Solutions</a>
      <!-- <a href="{{ '/pricing/' | relative_url }}">Pricing</a> -->

      <div class="dropdown">
        <a href="{{ '/resources/' | relative_url }}">Resources</a>
        <div class="dropdown-menu">
          <a href="{{ '/resources/docs/' | relative_url }}">Documentation</a>
          <a href="{{ '/resources/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/support/' | relative_url }}">Support</a>
          <a href="{{ '/resources/faq/' | relative_url }}">FAQ</a>
          <a href="{{ '/publications/' | relative_url }}">Publications</a>
        </div>
      </div>

      <div class="dropdown">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <div class="dropdown-menu">
          <a href="{{ '/about/#our-story' | relative_url }}">Our Story</a>
          <a href="{{ '/about/#team' | relative_url }}">Team</a>
        </div>
      </div>

      <a href="{{ '/' | relative_url }}#contact">Contact</a>
    </div>
  </nav>

  {{ content }}
</body>
</html>
